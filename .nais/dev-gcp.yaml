apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: postmottak-backend
  namespace: aap
  labels:
    team: aap
    sub: postmottak
spec:
  image: {{image}}
  ingresses:
    - https://aap-postmottak-backend.intern.dev.nav.no
  resources:
    limits:
      memory: 1024Mi
    requests:
      cpu: 261m
      memory: 528Mi
  replicas:
    cpuThresholdPercentage: 90
    max: 2
    min: 1
  terminationGracePeriodSeconds: 30
  observability:
    autoInstrumentation:
      enabled: true
      runtime: "java"
    logging:
      destinations:
        - id: elastic
        - id: loki
  azure:
    application:
      enabled: true
      allowAllUsers: true
      claims:
        extra:
          - "NAVident"
          - "azp_name"
        groups:
          - id: ee2a0374-97a6-462e-9a05-3cb7be3d8fc5 #NAIS_TEAM_AAP
  kafka:
    pool: nav-dev
    streams: true
  gcp:
    sqlInstances:
      - type: POSTGRES_16
        flags:
          - name: cloudsql.logical_decoding
            value: "on"
        tier: db-f1-micro
        diskAutoresize: true
        highAvailability: false
        pointInTimeRecovery: false
        databases:
          - name: postmottak
            envVarPrefix: DB_POSTMOTTAK
            users:
              - name: datastream
  liveness:
    path: /actuator/live
    initialDelay: 5
  readiness:
    path: /actuator/ready
    initialDelay: 5
  prometheus:
    enabled: true
    path: /actuator/metrics
  envFrom:
    - secret: kelvin-unleash-api-token
  accessPolicy:
    inbound:
      rules:
        - application: saksbehandling
        - application: saksbehandling-lokal # For lokal utvikling. IKKE kopier denne til prod-gcp.yaml
        - application: paw-patrol
        - application: azure-token-generator
          namespace: nais
          cluster: dev-gcp
    outbound:
      rules:
        - application: logging
          namespace: nais-system
        - application: skjermede-personer-pip
          namespace: nom
        - application: tilgang
        - application: statistikk
        - application: oppgave
        - application: behandlingsflyt
        - application: api-intern
      external:
        - host: aap-unleash-api.nav.cloud.nais.io
        - host: saf.dev-fss-pub.nais.io
        - host: dokarkiv.dev-fss-pub.nais.io
        - host: oppgave.dev-fss-pub.nais.io
        - host: pdl-api.dev-fss-pub.nais.io
        - host: aap-fss-proxy.dev-fss-pub.nais.io
        - host: veilarbarena.dev-fss-pub.nais.io
        - host: ereg-services-q2.dev-fss-pub.nais.io
        - host: arenaoppslag.dev-fss-pub.nais.io
  env:
    - name: INTEGRASJON_AAP_ARENAOPPSLAG_PROXY_URL
      value: https://arenaoppslag.dev-fss-pub.nais.io
    - name: INTEGRASJON_AAP_ARENAOPPSLAG_SCOPE
      value: api://dev-fss.aap.arenaoppslag/.default
    - name: INTEGRASJON_SAF_URL_GRAPHQL
      value: https://saf-q2.dev-fss-pub.nais.io/graphql
    - name: INTEGRASJON_SAF_URL_REST
      value: https://saf-q2.dev-fss-pub.nais.io/rest
    - name: INTEGRASJON_SAF_SCOPE
      value: api://dev-fss.teamdokumenthandtering.saf/.default
    - name: INTEGRASJON_JOARK_URL
      value: https://dokarkiv-q2.dev-fss-pub.nais.io
    - name: INTEGRASJON_JOARK_SCOPE
      value: api://dev-fss.teamdokumenthandtering.dokarkiv/.default
    - name: INTEGRASJON_AAP_FSS_PROXY_URL
      value: https://aap-fss-proxy.dev-fss-pub.nais.io
    - name: INTEGRASJON_AAP_FSS_PROXY_SCOPE
      value: api://dev-fss.aap.fss-proxy/.default
    - name: INTEGRASJON_BEHANDLINGSFLYT_URL
      value: http://behandlingsflyt
    - name: INTEGRASJON_BEHANDLINGSFLYT_SCOPE
      value: api://dev-gcp.aap.behandlingsflyt/.default
    - name: INTEGRASJON_OPPGAVE_URL
      value: http://oppgave
    - name: INTEGRASJON_OPPGAVE_SCOPE
      value: api://dev-gcp.aap.oppgave/.default
    - name: INTEGRASJON_TILGANG_URL
      value: http://tilgang
    - name: INTEGRASJON_TILGANG_SCOPE
      value: api://dev-gcp.aap.tilgang/.default
    - name: INTEGRASJON_OPPGAVEAPI_URL
      value: https://oppgave.dev-fss-pub.nais.io
    - name: INTEGRASJON_OPPGAVEAPI_SCOPE
      value: api://dev-fss.oppgavehandtering.oppgave/.default
    - name: GOSYS_URL
      value: https://gosys-q2.dev.intern.nav.no/gosys
    - name: INTEGRASJON_PDL_URL
      value: https://pdl-api.dev-fss-pub.nais.io
    - name: INTEGRASJON_PDL_SCOPE
      value: api://dev-fss.pdl.pdl-api/.default
    - name: INTEGRASJON_ARENA_URL
      value: https://aap-fss-proxy.dev-fss-pub.nais.io
    - name: INTEGRASJON_ARENA_SCOPE
      value: api://dev-fss.aap.fss-proxy/.default
    - name: INTEGRASJON_NORG_URL
      value: https://norg2.dev-fss-pub.nais.io
    - name: INTEGRASJON_NOM_URL
      value: http://skjermede-personer-pip.nom
    - name: INTEGRASJON_NOM_SCOPE
      value: api://dev-gcp.nom.skjermede-personer-pip/.default
    - name: INTEGRASJON_VEILARBARENA_URL
      value: https://veilarbarena.dev-fss-pub.nais.io
    - name: INTEGRASJON_VEILARBARENA_SCOPE
      value: api://dev-fss.pto.veilarbarena/.default
    - name: INTEGRASJON_STATISTIKK_URL
      value: http://statistikk
    - name: INTEGRASJON_STATISTIKK_SCOPE
      value: api://dev-gcp.aap.statistikk/.default
    - name: INTEGRASJON_EREG_URL
      value: https://ereg-services-q2.dev-fss-pub.nais.io
    - name: INTEGRASJON_EREG_SCOPE
      value: api://dev-fss.arbeidsforhold.ereg-services/.default
